# -------------------------------------------------------
# Logging configuration
# -------------------------------------------------------

# Show INFO level logs for Spring itself
logging.level.org.springframework=info

# Show DEBUG level logs for our own code
logging.level.com.cognizant=debug

# Show the actual SQL queries Hibernate runs
logging.level.org.hibernate.SQL=trace

# Show the values being passed into SQL queries
logging.level.org.hibernate.orm.jdbc.bind=trace

# Log format: date  time  thread  level  logger  method  line  message
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n


# -------------------------------------------------------
# Database configuration  (update password if different)
# -------------------------------------------------------
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/ormlearn
spring.datasource.username=root
spring.datasource.password=Rohithk@22052005


# -------------------------------------------------------
# Hibernate configuration
# -------------------------------------------------------

# validate  = Hibernate checks the table columns match our entity class
#             but does NOT create or change anything in the DB
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
